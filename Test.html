<html>
    <head>
        <title>Test Program - Login</title>
        <link rel="stylesheet" href="test.css">
    </head>
    <body>
        <h1>Login User</h1>
        <form id="loginForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>
            <button type="submit">Login</button>
        </form>
        <div id="searchContainer" style="display:none; max-width:700px; margin:0 auto 16px auto; text-align:center;">
            <input type="text" id="searchInput" placeholder="Cari nama, status, atau field lain..." style="padding:8px 12px; width:60%; border-radius:6px; border:1px solid #b0c4de; font-size:1rem;">
        </div>
        <div id="loginMessage"></div>
        <div id="pagination" style="display:none; max-width:700px; margin:16px auto 0 auto; text-align:center;"></div>
        <script src="Test.js"></script>
    </body>
</html>
